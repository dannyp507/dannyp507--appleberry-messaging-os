services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: appleberry
      POSTGRES_PASSWORD: appleberry
      POSTGRES_DB: appleberry
    ports:
      - '5433:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U appleberry -d appleberry']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    command: ['redis-server', '--appendonly', 'yes']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pg_data:
  redis_data:

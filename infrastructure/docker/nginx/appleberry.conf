# Upstreams use Docker Compose service names (resolved on the appleberry network).
# /api/... → Nest (api:3001), path prefix /api/ is stripped before proxy_pass.
# /...     → Next.js standalone (web:3000).

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream appleberry_web {
    server web:3000;
    keepalive 32;
}

upstream appleberry_api {
    server api:3001;
    keepalive 32;
}

# Optional: set a real hostname for clearer logs and stricter matching, e.g.:
# server_name app.example.com;

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let’s Encrypt HTTP-01 (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Bare /api → /api/ (avoids accidental misses on location /api/)
    location = /api {
        return 308 $scheme://$host/api/;
    }

    location /api/ {
        proxy_pass http://appleberry_api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout 120s;
    }

    location / {
        proxy_pass http://appleberry_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

